<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดเตรียม Kit ใหม่ - PharmaKit</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F0F4F3; font-family: 'Kanit', sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header-box { background-color: #015958; color: white; padding: 20px; border-radius: 15px 15px 0 0; text-align: center; }
        .expiry-highlight { background-color: #FFF4E5; border: 2px dashed #FF9F00; padding: 10px; border-radius: 10px; text-align: center; margin: 15px 0; }
        .label { color: #015958; margin-bottom: 0.2rem; }
        .drug-row { padding: 10px 0; border-bottom: 1px solid #eee; }
        .drug-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <section class="section">
        <div class="container">
            <div class="card">
                <div class="header-box">
                    <h1 class="title is-4 has-text-white">🛠️ บันทึกการจัดเตรียม Kit</h1>
                </div>
                <div class="card-content">
                    <div class="field">
                        <label class="label">จำนวนที่จัดเตรียม (กล่อง)</label>
                        <input class="input" type="number" id="kitCount" min="1" value="1">
                    </div>

                    <div class="columns is-mobile">
                        <div class="column">
                            <label class="label">ผู้จัดเตรียม (ผู้ช่วยฯ)</label>
                            <input class="input" type="text" id="assistant" placeholder="ชื่อ">
                        </div>
                        <div class="column">
                            <label class="label">เภสัชกรผู้ตรวจสอบ</label>
                            <input class="input" type="text" id="pharmacist" placeholder="ชื่อ">
                        </div>
                    </div>

                    <hr>

                    <div class="box" style="background-color: #fafafa;">
                        <p class="subtitle is-6 has-text-weight-bold has-text-primary">💊 รายละเอียดล็อตและวันหมดอายุ</p>
                        
                        <div class="drug-row">
                            <p class="is-size-7 has-text-weight-bold">1. DMSO</p>
                            <div class="columns is-mobile">
                                <div class="column"><input class="input is-small" id="lot1" placeholder="LOT"></div>
                                <div class="column"><input class="input is-small" type="date" id="exp1" onchange="calculateKitExpiry()"></div>
                            </div>
                        </div>

                        <div class="drug-row">
                            <p class="is-size-7 has-text-weight-bold">2. 1% Hydrocortisone Cream</p>
                            <div class="columns is-mobile">
                                <div class="column"><input class="input is-small" id="lot2" placeholder="LOT"></div>
                                <div class="column"><input class="input is-small" type="date" id="exp2" onchange="calculateKitExpiry()"></div>
                            </div>
                        </div>

                        <div class="drug-row">
                            <p class="is-size-7 has-text-weight-bold">3. 70% Alcohol 60 mL</p>
                            <div class="columns is-mobile">
                                <div class="column"><input class="input is-small" id="lot3" placeholder="LOT"></div>
                                <div class="column"><input class="input is-small" type="date" id="exp3" onchange="calculateKitExpiry()"></div>
                            </div>
                        </div>

                        <div class="drug-row">
                            <p class="is-size-7 has-text-weight-bold">4. SWI 10 mL</p>
                            <div class="columns is-mobile">
                                <div class="column"><input class="input is-small" id="lot4" placeholder="LOT"></div>
                                <div class="column"><input class="input is-small" type="date" id="exp4" onchange="calculateKitExpiry()"></div>
                            </div>
                        </div>
                    </div>

                    <div class="expiry-highlight">
                        <p class="is-size-7">วันหมดอายุของ Kit (FEFO)</p>
                        <p class="title is-4 has-text-danger" id="kitExpiryDisplay">-</p>
                    </div>

                    <div class="field">
                        <label class="label">สถานที่เก็บสำรอง</label>
                        <div class="select is-fullwidth">
                            <select id="storage">
                                <option value="คลังยา">คลังยา</option>
                                <option value="ห้องผสมยา">ห้องผสมยา</option>
                                <option value="ตู้เย็น">ตู้เย็น</option>
                            </select>
                        </div>
                    </div>

                    <button class="button is-primary is-fullwidth is-large mt-5" id="btnSubmit" onclick="confirmAndSubmit()">
                        🚀 ยืนยันข้อมูลและสร้าง ID
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // 🚩 เปลี่ยนเป็น LIFF ID ของคุณ
        const LIFF_ID = "2009195357-6v2tIVUM"; 

        async function initLIFF() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) liff.login();
            } catch (err) { console.error("LIFF Error", err); }
        }
        initLIFF();

        /** 🔍 คำนวณวันหมดอายุที่น้อยที่สุดจากยาทั้ง 4 ตัว */
        function calculateKitExpiry() {
            const dates = [];
            for (let i = 1; i <= 4; i++) {
                const val = document.getElementById('exp' + i).value;
                if (val) dates.push(new Date(val));
            }
            
            const display = document.getElementById('kitExpiryDisplay');
            if (dates.length === 0) {
                display.innerText = "-";
                return;
            }

            const minDate = new Date(Math.min(...dates));
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            display.innerText = minDate.toLocaleDateString('th-TH', options);
        }

        async function confirmAndSubmit() {
            const btn = document.getElementById('btnSubmit');
            const fields = {
                count: document.getElementById('kitCount').value,
                assistant: document.getElementById('assistant').value,
                pharmacist: document.getElementById('pharmacist').value,
                storage: document.getElementById('storage').value
            };

            // รวบรวมข้อมูลยา 4 ตัว
            const items = [];
            for (let i = 1; i <= 4; i++) {
                const lot = document.getElementById('lot' + i).value || "-";
                const exp = document.getElementById('exp' + i).value;
                if (!exp) {
                    alert(`⚠️ กรุณาระบุวันหมดอายุของยาตัวที่ ${i}`);
                    return;
                }
                items.push(lot, exp);
            }

            if (!fields.assistant || !fields.pharmacist) {
                alert("⚠️ กรุณากรอกชื่อผู้รับผิดชอบให้ครบถ้วน");
                return;
            }

            if (confirm(`ยืนยันการจัดเตรียม Kit จำนวน ${fields.count} กล่อง?\nระบบจะรันเลข ID ให้อัตโนมัติหลังกดตกลง`)) {
                btn.disabled = true;
                btn.classList.add('is-loading');

                try {
                    // รูปแบบ: PREP_KIT_LIFF | count | assist | pharma | lot1 | exp1 | lot2 | exp2 | lot3 | exp3 | lot4 | exp4 | storage
                    const msg = `PREP_KIT_LIFF|${fields.count}|${fields.assistant}|${fields.pharmacist}|${items.join('|')}|${fields.storage}`;
                    
                    await liff.sendMessages([{ "type": "text", "text": msg }]);
                    liff.closeWindow();
                } catch (err) {
                    btn.disabled = false;
                    btn.classList.remove('is-loading');
                    alert("❌ Error: " + err.message);
                }
            }
        }
    </script>
</body>
</html>
